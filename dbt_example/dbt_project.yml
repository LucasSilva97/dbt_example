
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'dbt_example'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt_example'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  dbt_example:
    # Config indicated by + and applies to all files under models/example/
    # Configuração de modelos de materialização
    # A configuração de materialização é uma das mais importantes, pois define como os modelos serão materializados no banco de dados. As opções comuns incluem:
    # view: O modelo é materializado como uma visão (view) no banco de dados. As visões são consultas armazenadas que são executadas toda vez que são acessadas. Elas
    # Definindo workspace
    staging:
      #definindo schema padrão
      schema: staging
      # definindo estrutura padrão para insert de dados
      materialized: table
      tags: ['staging']
    # Usando outras camadas do medalion
    intermediate:
    # Esse modelo não gera uma tabela, apenas executa a query, tipo uma view
      materialized: ephemeral
      tags: ['intermediate']

    marts:
      schema: marts
      materialized : table
      tags: ['marts']

    # Tags - método para chamar cada modelo
